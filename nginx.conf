server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep the custom model-pricing endpoint available after the Vite migration.
    location = /api/channel-pricing {
        proxy_pass https://yynewapi.yangyangnj.top/api/pricing;
        proxy_set_header Host yynewapi.yangyangnj.top;
        proxy_ssl_server_name on;
    }

    location = /api/prompts {
        proxy_pass https://canvas.cangyuansuanli.cn/api/prompts;
        proxy_set_header Host canvas.cangyuansuanli.cn;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 运行期配置由容器启动时生成，禁止缓存，确保改环境变量后即时生效。
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
